id          = "email-processing"
name        = "Email Processing Hand"
description = "Classifies, monitors, and processes incoming email across MS365 + IMAP accounts. Backlog (interactive training) and incremental (autonomous) modes. Generates per-project digests, raises urgent alerts, and synthesizes Sieve scripts on the IMAP server."
category    = "productivity"
icon        = "\U0001F4E7"

# ─── Tools, skills, MCP servers ──────────────────────────────────────────────

tools = [
    "memory_store",
    "memory_recall",
    "schedule_create",
    "schedule_list",
    "schedule_delete",
    "event_publish",
    "shell_exec",
]
skills = []
# rustymail covers IMAP fetch + ManageSieve. ms365 covers the work account.
# slack handles urgent alerts. mcp-atlassian is for project-list bootstrap.
# All four must be configured in ~/.openfang/config.toml. Skeleton tolerates
# missing servers (logs + degrades) — they're only required as features land.
mcp_servers = ["rustymail", "ms365", "slack", "mcp-atlassian"]

